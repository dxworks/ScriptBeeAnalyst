<div class="auth-background">
  <div class="auth-card">
    <!-- Logo / Brand -->
    <div class="text-center mb-lg">
      <div class="flex items-center justify-center gap-sm mb-md">
        <svg class="w-8 h-8 text-accent" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1 class="text-xl font-semibold m-0">ScriptBeeAssistant</h1>
      </div>
      <p class="text-secondary text-sm m-0">Create your account</p>
    </div>

    @if (success()) {
      <!-- Success Message -->
      <div class="text-center">
        <div class="badge badge-success mb-md" style="padding: 1rem;">
          Account created successfully!
        </div>
        <p class="text-secondary text-sm">Redirecting to login...</p>
      </div>
    } @else {
      <!-- Register Form -->
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="Enter your email"
            [class.error]="error()"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="Create a password"
            [class.error]="error()"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
          />
          <p class="form-hint">Must be at least 6 characters</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            class="form-input"
            placeholder="Confirm your password"
            [class.error]="error()"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            name="confirmPassword"
          />
        </div>

        @if (error()) {
          <div class="form-error mb-md">{{ error() }}</div>
        }

        <button
          type="submit"
          class="btn btn-primary btn-block btn-lg"
          [disabled]="loading()"
        >
          @if (loading()) {
            Creating account...
          } @else {
            Create Account
          }
        </button>
      </form>

      <!-- Login Link -->
      <div class="divider">or</div>

      <p class="text-center text-sm text-secondary m-0">
        Already have an account?
        <a routerLink="/auth/login" class="font-medium">Sign in</a>
      </p>
    }
  </div>
</div>
