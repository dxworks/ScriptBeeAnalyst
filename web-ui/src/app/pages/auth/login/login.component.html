<div class="auth-background">
  <div class="auth-card">
    <!-- Logo / Brand -->
    <div class="text-center mb-lg">
      <div class="flex items-center justify-center gap-sm mb-md">
        <svg class="w-8 h-8 text-accent" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1 class="text-xl font-semibold m-0">ScriptBeeAssistant</h1>
      </div>
      <p class="text-secondary text-sm m-0">AI-powered project analytics</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="Enter your email"
          [class.error]="error()"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          placeholder="Enter your password"
          [class.error]="error()"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
        />
      </div>

      @if (error()) {
        <div class="form-error mb-md">{{ error() }}</div>
      }

      <button
        type="submit"
        class="btn btn-primary btn-block btn-lg"
        [disabled]="loading()"
      >
        @if (loading()) {
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <!-- Register Link -->
    <div class="divider">or</div>

    <p class="text-center text-sm text-secondary m-0">
      Don't have an account?
      <a routerLink="/auth/register" class="font-medium">Create one</a>
    </p>
  </div>
</div>
