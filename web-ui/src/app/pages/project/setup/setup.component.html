<div class="setup-shell">
  <div class="setup-header">
    <nav class="setup-tabs" aria-label="Setup steps">
      @for (tab of tabs; track tab.id) {
        @if (isTabLocked(tab)) {
          <span
            class="setup-tab locked"
            aria-disabled="true"
            [title]="lockTooltip(tab)"
          >
            <svg class="tab-lock-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            {{ tab.label }}
          </span>
        } @else {
          <a
            [routerLink]="tab.path"
            routerLinkActive="active"
            class="setup-tab"
          >
            {{ tab.label }}
          </a>
        }
      }
    </nav>

    <div class="setup-actions">
      @if (isFinalized()) {
        <span class="lifecycle-badge ready" title="Setup is finalized; this project is in the query stage.">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Ready for queries
        </span>
        <!-- One-way: there is no un-finalize endpoint, so the "back to config"
             action is shown disabled with an explanatory tooltip. -->
        <button
          type="button"
          class="btn btn-secondary"
          disabled
          title="Finalizing is one-way. Re-import the project to edit setup again."
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          </svg>
          Back to config
        </button>
      } @else {
        @if (finalizeRunning()) {
          <span class="lifecycle-badge setup" title="A finalize is in progress; the Analysis tab shows its loading bar.">
            Finalizing…
          </span>
        } @else {
          <span class="lifecycle-badge setup" title="Setup stage; finalize when author merges and enrichment config are confirmed.">
            Config
          </span>
        }
        <button
          type="button"
          class="btn btn-primary"
          [disabled]="!canFinalize() || finalizeRunning()"
          (click)="openConfirm()"
          title="Lock in author merges + enrichment config and move to the Analysis stage."
        >
          @if (finalizeRunning()) {
            <span class="spinner-small" aria-hidden="true"></span>
            Finalizing…
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Lock in &amp; Analyze
          }
        </button>
      }
    </div>
  </div>

  <div class="setup-content">
    <router-outlet />
  </div>
</div>

@if (showConfirm()) {
  <app-confirmation-modal
    title="Finalize this project?"
    message="Finalizing rewrites every author reference to a unified user and rebuilds the people-side analytics, then unlocks the Analysis stage. This is one-way — re-importing the project is the only way back. Confirm your author merges and enrichment config before continuing. You'll be taken to the Analysis tab to watch progress; Phase B can take a couple of minutes, so keep this tab open."
    confirmText="Lock in & Analyze"
    cancelText="Cancel"
    type="warning"
    [loading]="finalizing()"
    (confirmed)="confirmFinalize()"
    (cancelled)="cancelConfirm()"
  />
}
