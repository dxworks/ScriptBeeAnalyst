<div class="app-layout">
  <!-- Global Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-left">
        <a routerLink="/dashboard" class="header-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="brand-name">ScriptBeeAssistant</span>
        </a>
      </div>
      <nav class="header-nav">
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
        <a
          [routerLink]="loadedProjectId() ? ['/project', loadedProjectId()] : '/project'"
          routerLinkActive="active"
          class="project-indicator"
          [class.indicator-loaded]="loadedProjectId() !== null"
          [title]="loadedProjectId() ? 'Go to project workspace' : 'No project loaded'"
        >
          @if (loadedProjectId() === null) {
            <span class="indicator-icon" aria-hidden="true">?</span>
          } @else {
            <svg class="indicator-icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          }
          <span class="indicator-label">{{ indicatorLabel() }}</span>
        </a>
        <a
          routerLink="/data-model"
          routerLinkActive="active"
          class="nav-link"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="5" cy="6" r="3"/>
            <circle cx="19" cy="6" r="3"/>
            <circle cx="12" cy="18" r="3"/>
            <line x1="7.5" y1="7.5" x2="10.5" y2="16"/>
            <line x1="16.5" y1="7.5" x2="13.5" y2="16"/>
          </svg>
          Data Model
        </a>
        <app-theme-toggle />
        <button class="nav-link" (click)="onLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign Out
        </button>
      </nav>
    </div>
  </header>

  <!-- Page Content -->
  <main class="app-main">
    <router-outlet />
  </main>
</div>
