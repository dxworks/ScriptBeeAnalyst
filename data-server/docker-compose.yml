services:
  data-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptbee-data-server
    ports:
      - "8001:8001"
    environment:
      # Supabase connection (server-hosted on jarvis)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # Graph processor configuration (Phase 3+)
      - GRAPH_USER_ID=${GRAPH_USER_ID}
      - GRAPH_PROJECT_ID=${GRAPH_PROJECT_ID}
    volumes:
      # Mount source for development (hot reload)
      - ./src:/app/src:ro
    command: uvicorn src.server:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptbee-processor
    environment:
      # Supabase connection (server-hosted on jarvis)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # Graph processor configuration
      - GRAPH_USER_ID=${GRAPH_USER_ID}
      - GRAPH_PROJECT_ID=${GRAPH_PROJECT_ID}
      - RECURSION_LIMIT=${RECURSION_LIMIT:-50000}
      # Force Python to unbuffer output for Docker logs
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source for development (hot reload)
      - ./src:/app/src:ro
    command: python -u -m src.processor --loop
    restart: unless-stopped
