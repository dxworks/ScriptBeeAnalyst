services:
  data-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptbee-data-server
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Supabase connection - uses SUPABASE_URL_DOCKER to resolve host from inside container
      - SUPABASE_URL=${SUPABASE_URL_DOCKER:-${SUPABASE_URL}}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # Logging configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Workspace for AI agent project folders
      - WORKSPACE_ROOT=/workspace/projects
    volumes:
      # Mount source for development (hot reload)
      - ./src:/app/src:ro
      # Mount workspace for AI agent scaffolding
      - ../analyzed_projects/projects:/workspace/projects
    command: uvicorn src.server:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptbee-processor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Supabase connection - uses SUPABASE_URL_DOCKER to resolve host from inside container
      - SUPABASE_URL=${SUPABASE_URL_DOCKER:-${SUPABASE_URL}}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # Graph processor configuration
      - RECURSION_LIMIT=${RECURSION_LIMIT:-50000}
      # Logging configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Force Python to unbuffer output for Docker logs
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source for development (hot reload)
      - ./src:/app/src:ro
    command: python -u -m src.processor
    restart: unless-stopped
