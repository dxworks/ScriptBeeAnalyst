services:
  data-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptbee-data-server
    ports:
      - "8001:8001"
    environment:
      # Supabase connection (inside Docker network, use container name)
      - SUPABASE_URL=http://kong:8000
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      # Mount source for development (hot reload)
      - ./src:/app/src:ro
    command: uvicorn src.server:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - supabase_default
    restart: unless-stopped

networks:
  # Connect to Supabase's network to access Kong, DB, Storage
  supabase_default:
    external: true
    name: supabase_default
